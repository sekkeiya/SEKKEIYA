volumes:
  sekkeiya_node_modules:
  share_node_modules:
  layout_node_modules:
  create_node_modules:

services:
  sekkeiya:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sekkeiya-app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - sekkeiya_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_HYBRID_MODE=true
    tty: true

  share-app:
    build:
      context: ../../028-R3DM-ver2/r3dm-share
      dockerfile: Dockerfile
    container_name: share-app
    ports:
      - "5174:5174"
    volumes:
      - ../../028-R3DM-ver2/r3dm-share:/app
      - share_node_modules:/app/node_modules
      - ./packages/global-panel:/040-sekkeiya/sekkeiya/packages/global-panel
      - sekkeiya_node_modules:/040-sekkeiya/sekkeiya/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  layout-app:
    build:
      context: ../../039-3dshapelayout-web/3d-shape-layout
      dockerfile: Dockerfile
    container_name: layout-app
    ports:
      - "5175:5175"
    volumes:
      - ../../039-3dshapelayout-web/3d-shape-layout:/app
      - layout_node_modules:/app/node_modules
      - ./packages/global-panel:/040-sekkeiya/sekkeiya/packages/global-panel
      - sekkeiya_node_modules:/040-sekkeiya/sekkeiya/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  create-app:
    build:
      context: ../../041-3dshapecreate/3dshapecreate-web
      dockerfile: Dockerfile
    container_name: create-app
    ports:
      - "5176:5176"
    volumes:
      - ../../041-3dshapecreate/3dshapecreate-web:/app
      - create_node_modules:/app/node_modules
      - ./packages/global-panel:/040-sekkeiya/sekkeiya/packages/global-panel
      - sekkeiya_node_modules:/040-sekkeiya/sekkeiya/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true